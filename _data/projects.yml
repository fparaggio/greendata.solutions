- name: ALIDA
  url: https://alida.crux.it
  partner: Advanced Laser Intelligence for Dynamic Assets
  partner_logo: alida_logo_black.svg
  description: >
    Physical validation layer for wind turbine operations. ALIDA uses ground-level
    laser sensing to measure operating turbines without shutdown, reconstructing
    rotor geometry and delivering blade-level diagnosis to confirm what monitoring
    platforms detect — bridging the gap between SCADA alerts and actionable root cause.
  highlights:
    - "Blade-level imbalance detection and pitch offset quantification — no turbine shutdown"
    - "Resolves ambiguous SCADA anomalies with physics-based structural evidence"
    - "Targeted pitch correction and post-fix verification to prove interventions worked"

