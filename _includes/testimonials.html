<!-- Testimonials — Tailwind CSS -->
<div class="reveal">

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for testimonial in site.data.testimonials %}
    <div class="bg-surface-850 border border-surface-700/30 rounded-2xl p-6 flex flex-col justify-between hover:border-brand-500/30 transition-all duration-300">
      <div>
        <svg class="w-8 h-8 text-brand-500/30 mb-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M11.3 2.6C6.1 5.1 3 9.3 3 14.1c0 3.2 2 5.9 4.8 5.9 2.4 0 4.2-1.8 4.2-4.1 0-2.2-1.6-3.9-3.7-4.1 0-3.1 2.1-6.2 5.2-7.8L11.3 2.6zm10 0c-5.2 2.5-8.3 6.7-8.3 11.5 0 3.2 2 5.9 4.8 5.9 2.4 0 4.2-1.8 4.2-4.1 0-2.2-1.6-3.9-3.7-4.1 0-3.1 2.1-6.2 5.2-7.8L21.3 2.6z"/>
        </svg>
        <p class="text-surface-100 text-sm sm:text-base leading-relaxed italic">{{ testimonial.quote }}</p>
      </div>
      <div class="mt-6 pt-4 border-t border-surface-700/30">
        <p class="text-xs font-mono text-surface-200/60">{{ testimonial.author }}</p>
        <p class="text-xs font-mono text-brand-400">{{ testimonial.company }}</p>
      </div>
    </div>
    {% endfor %}
  </div>

  <!-- LinkedIn link -->
  <div class="text-center mt-10">
    <a href="https://www.linkedin.com/in/fparaggio/" target="_blank" rel="noopener noreferrer"
       class="inline-flex items-center gap-2 text-sm text-surface-200/50 hover:text-brand-400 transition-colors duration-300 font-mono">
      View full recommendations on LinkedIn
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
    </a>
  </div>

</div>
