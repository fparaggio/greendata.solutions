<!-- Clients logo marquee — Tailwind CSS (fin.ai inspired) -->
<div class="reveal">

  <!-- Scrolling logo strip -->
  <div class="relative overflow-hidden py-6" style="mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);">
    <div class="logo-marquee-track">
      {% for client in site.data.clients %}
      <div class="flex-shrink-0 flex items-center justify-center mx-8 sm:mx-10 opacity-60 hover:opacity-100 transition-opacity duration-300 grayscale hover:grayscale-0" style="min-width:100px;">
        <img src="{{ '/assets/img/' | append: client.logo | prepend: site.url }}" alt="{{ client.name }}" class="h-8 sm:h-10 w-auto max-w-[120px] object-contain" />
      </div>
      {% endfor %}
      <!-- Duplicate for seamless loop -->
      {% for client in site.data.clients %}
      <div class="flex-shrink-0 flex items-center justify-center mx-8 sm:mx-10 opacity-60 hover:opacity-100 transition-opacity duration-300 grayscale hover:grayscale-0" style="min-width:100px;">
        <img src="{{ '/assets/img/' | append: client.logo | prepend: site.url }}" alt="{{ client.name }}" class="h-8 sm:h-10 w-auto max-w-[120px] object-contain" />
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- Client grid with details (below the marquee) -->
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 mt-12">
    {% for client in site.data.clients %}
    <div class="group bg-surface-850 border border-surface-700/30 rounded-xl p-4 text-center hover:border-brand-500/30 transition-all duration-300">
      <div class="flex items-center justify-center h-10 mb-3">
        <img src="{{ '/assets/img/' | append: client.logo | prepend: site.url }}" alt="{{ client.name }}" class="h-7 w-auto max-w-[90px] object-contain opacity-70 group-hover:opacity-100 transition-opacity" />
      </div>
      <p class="text-[11px] text-surface-200/40 leading-tight font-mono">{{ client.area }}</p>
    </div>
    {% endfor %}
  </div>

</div>
