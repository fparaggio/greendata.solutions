<!-- Footer — Tailwind CSS -->

    <p class="text-xs text-surface-200/40 font-mono">
      &copy; <time datetime="{{ site.time | date_to_xmlschema }}">{{ site.time | date: '%Y' }}</time>
      {{ site.title }}

  </div>
</footer>
