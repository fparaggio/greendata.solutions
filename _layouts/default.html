<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    {% if page.layout == "home" %}
    {{ site.title }}
    {% else %}
    {{ site.title }} &middot; {{ page.title }}
    {% endif %}
  </title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#ecfdf5',
              100: '#d1fae5',
              200: '#a7f3d0',
              300: '#6ee7b7',
              400: '#34d399',
              500: '#10b981',
              600: '#059669',
              700: '#047857',
              800: '#065f46',
              900: '#064e3b',
              950: '#022c22',
            },
            surface: {
              50:  '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              700: '#1a1f2e',
              800: '#111827',
              850: '#0d1117',
              900: '#0a0e14',
              950: '#060a10',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          animation: {
            'scroll-left': 'scroll-left 40s linear infinite',
            'fade-in-up': 'fade-in-up 0.6s ease-out both',
          },
          keyframes: {
            'scroll-left': {
              '0%':   { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            },
            'fade-in-up': {
              '0%':   { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Inter + JetBrains Mono fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | prepend: site.url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | prepend: site.url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16x16.png' | prepend: site.url }}">

  {% seo title=false %}

  <style>
    /* Particles overlay */
    #particles-js {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100vh;
      z-index: 0;
    }
    #particles-js canvas { display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e14; }
    ::-webkit-scrollbar-thumb { background: #1a1f2e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #10b981; }

    /* Logo marquee */
    .logo-marquee-track {
      display: flex;
      width: max-content;
      animation: scroll-left 40s linear infinite;
    }
    .logo-marquee-track:hover { animation-play-state: paused; }
    .logo-marquee-mask {
      mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
    }
    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Chat bubble typing animation */
    .typing-dot {
      animation: typing 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* Fade in on scroll */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease-out, transform 0.7s ease-out;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-surface-950 text-surface-200 font-sans antialiased">

  {{ content }}

  <!-- Particles JS -->
  <script src="{{ '/assets/js/particles.min.js' | prepend: site.url }}"></script>
  <script src="{{ '/assets/js/main.js' | prepend: site.url }}"></script>

  <!-- Scroll reveal -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var reveals = document.querySelectorAll('.reveal');
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.12 });
      reveals.forEach(function (el) { observer.observe(el); });
    });
  </script>
</body>

</html>
